<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial de Alfajores 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #120a05;
  color: #f0dfc0;
  font-family: 'Lora', serif;
  min-height: 100vh;
  overflow-x: hidden;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

::-webkit-scrollbar { height: 6px; width: 6px; background: #120a05; }
::-webkit-scrollbar-thumb { background: rgba(212,168,83,0.3); border-radius: 3px; }

.score-input {
  width: 38px;
  background: rgba(212,168,83,0.08);
  border: 1px solid rgba(212,168,83,0.25);
  border-radius: 5px;
  color: #d4a853;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px;
  text-align: center;
  padding: 2px 3px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.score-input:focus {
  border-color: rgba(212,168,83,0.7);
  background: rgba(212,168,83,0.15);
}
.score-input::placeholder { color: rgba(212,168,83,0.2); }

.team-slot {
  display: flex;
  align-items: center;
  gap: 8px;
  height: 50px;
  padding: 0 10px 0 8px;
  cursor: pointer;
  transition: background 0.18s;
  user-select: none;
}
.team-slot:hover { background: rgba(212,168,83,0.07); }
.team-slot.winner { background: rgba(212,168,83,0.11); }
.team-slot.loser { opacity: 0.38; }

.match-card {
  border-radius: 10px;
  overflow: hidden;
  background: rgba(28,14,6,0.95);
  border: 1px solid rgba(212,168,83,0.2);
  box-shadow: 0 8px 28px rgba(0,0,0,0.55), inset 0 1px 0 rgba(212,168,83,0.07);
  transition: border-color 0.25s, box-shadow 0.25s;
}
.match-card:hover {
  border-color: rgba(212,168,83,0.38);
  box-shadow: 0 12px 36px rgba(0,0,0,0.65), inset 0 1px 0 rgba(212,168,83,0.1);
}

.btn-primary {
  background: #d4a853;
  border: none;
  border-radius: 8px;
  color: #120a05;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px;
  letter-spacing: 1.5px;
  padding: 11px 0;
  cursor: pointer;
  flex: 1;
  transition: background 0.2s, transform 0.1s;
}
.btn-primary:hover { background: #e0b860; }
.btn-primary:active { transform: scale(0.97); }
.btn-secondary {
  background: transparent;
  border: 1px solid rgba(212,168,83,0.28);
  border-radius: 8px;
  color: rgba(240,223,192,0.6);
  font-family: 'Lora', serif;
  font-size: 13px;
  padding: 11px 0;
  cursor: pointer;
  flex: 1;
  transition: border-color 0.2s;
}
.btn-secondary:hover { border-color: rgba(212,168,83,0.55); }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: none; }
}
@keyframes crownPop {
  0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
  70%  { transform: scale(1.3) rotate(5deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useRef, useEffect } = React;

// ─── SVG Alfajor Components ────────────────────────────────────────
// Variantes de alfajor según índice de equipo
const ALFAJOR_COLORS = [
  { top: '#4a2510', bot: '#3a1c0c', fill: '#c47a2b', coat: '#2d1206' }, // chocolate negro
  { top: '#f5e6c8', bot: '#e8d4a8', fill: '#c47a2b', coat: '#f5e6c8' }, // blanco
  { top: '#7b3f1a', bot: '#5c2e10', fill: '#d4a853', coat: '#7b3f1a' }, // chocolate con leche
  { top: '#f0f0f0', bot: '#e0e0e0', fill: '#c47a2b', coat: '#f0f0f0' }, // glasé
];

function AlfajorSVG({ colorIdx = 0, size = 34, style = {} }) {
  const c = ALFAJOR_COLORS[colorIdx % ALFAJOR_COLORS.length];
  const r = size / 2;
  const thickness = size * 0.28;
  const gap = size * 0.18;
  const totalH = thickness * 2 + gap;
  const cy1 = thickness / 2;
  const cy2 = thickness + gap + thickness / 2;
  const mid = cy1 + thickness / 2 + gap / 2;

  return (
    <svg width={size} height={totalH} viewBox={`0 0 ${size} ${totalH}`} style={style}>
      <defs>
        <radialGradient id={`g1_${colorIdx}`} cx="40%" cy="35%">
          <stop offset="0%" stopColor={lighten(c.top, 0.25)} />
          <stop offset="100%" stopColor={c.top} />
        </radialGradient>
        <radialGradient id={`g2_${colorIdx}`} cx="40%" cy="35%">
          <stop offset="0%" stopColor={lighten(c.bot, 0.18)} />
          <stop offset="100%" stopColor={c.bot} />
        </radialGradient>
      </defs>
      {/* Tapa superior */}
      <ellipse cx={r} cy={cy1} rx={r} ry={thickness/2} fill={`url(#g1_${colorIdx})`} />
      {/* Relleno (dulce de leche) */}
      <rect x={2} y={cy1} width={size-4} height={gap} fill={c.fill} rx={1} />
      {/* Borde relleno */}
      <rect x={0} y={cy1} width={size} height={gap} fill="none"
        stroke={c.fill} strokeWidth={2} rx={1} opacity={0.6} />
      {/* Tapa inferior */}
      <ellipse cx={r} cy={cy2} rx={r} ry={thickness/2} fill={`url(#g2_${colorIdx})`} />
      {/* Brillo superior */}
      <ellipse cx={r * 0.65} cy={cy1 - thickness * 0.18} rx={r * 0.32} ry={thickness * 0.13}
        fill="rgba(255,255,255,0.18)" />
    </svg>
  );
}

// Ilustración grande decorativa de alfajor
function AlfajorIllustration({ size = 90, colorIdx = 0, style = {} }) {
  const c = ALFAJOR_COLORS[colorIdx % ALFAJOR_COLORS.length];
  const r = size / 2;
  const th = size * 0.3;
  const gap = size * 0.22;
  const totalH = th * 2 + gap;

  return (
    <svg width={size} height={totalH} viewBox={`0 0 ${size} ${totalH}`} style={style}>
      <defs>
        <radialGradient id={`big1_${colorIdx}`} cx="38%" cy="32%">
          <stop offset="0%" stopColor={lighten(c.top, 0.35)} />
          <stop offset="100%" stopColor={c.top} />
        </radialGradient>
        <radialGradient id={`big2_${colorIdx}`} cx="38%" cy="32%">
          <stop offset="0%" stopColor={lighten(c.bot, 0.22)} />
          <stop offset="100%" stopColor={c.bot} />
        </radialGradient>
        <filter id={`shadow_${colorIdx}`}>
          <feDropShadow dx="0" dy="4" stdDeviation="6" floodColor="#000" floodOpacity="0.5" />
        </filter>
      </defs>
      <g filter={`url(#shadow_${colorIdx})`}>
        {/* Tapa superior */}
        <ellipse cx={r} cy={th/2} rx={r} ry={th/2} fill={`url(#big1_${colorIdx})`} />
        {/* Relleno */}
        <rect x={3} y={th/2} width={size-6} height={gap} fill={c.fill} rx={2} />
        <rect x={0} y={th/2} width={size} height={gap} fill="none"
          stroke={darken(c.fill, 0.15)} strokeWidth={1.5} rx={2} opacity={0.7} />
        {/* Puntitos en el relleno */}
        {[0.25, 0.5, 0.75].map((x, i) => (
          <circle key={i} cx={size * x} cy={th/2 + gap/2}
            r={2} fill={darken(c.fill, 0.2)} opacity={0.5} />
        ))}
        {/* Tapa inferior */}
        <ellipse cx={r} cy={th + gap + th/2} rx={r} ry={th/2} fill={`url(#big2_${colorIdx})`} />
        {/* Brillo */}
        <ellipse cx={r * 0.58} cy={th * 0.28} rx={r * 0.28} ry={th * 0.12}
          fill="rgba(255,255,255,0.22)" />
        {/* Textura superior */}
        <ellipse cx={r} cy={th/2} rx={r * 0.85} ry={th * 0.4}
          fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={1} />
      </g>
    </svg>
  );
}

// Helpers de color
function lighten(hex, amount) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, ((n>>16)&255) + Math.round(amount*255));
  const g = Math.min(255, ((n>>8)&255)  + Math.round(amount*255));
  const b = Math.min(255,  (n&255)       + Math.round(amount*255));
  return `rgb(${r},${g},${b})`;
}
function darken(hex, amount) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, ((n>>16)&255) - Math.round(amount*255));
  const g = Math.max(0, ((n>>8)&255)  - Math.round(amount*255));
  const b = Math.max(0,  (n&255)       - Math.round(amount*255));
  return `rgb(${r},${g},${b})`;
}

const SLOT_H  = 50;
const MATCH_H = SLOT_H * 2 + 1;
const BHEIGHT = 960;
const TPAD    = 16;
const COL_W   = 216;
const CONN_W  = 48;

// 16 teams → Octavos (8 matches), Cuartos (4), Semis (2), Final (1)
const N_OCT   = 8;
const OCT_SLOT = (BHEIGHT - TPAD * 2) / N_OCT;
const oc = Array(N_OCT).fill(0).map((_,i) => TPAD + OCT_SLOT * i + OCT_SLOT / 2);
const ot = oc.map(c => c - MATCH_H / 2);

const cc = [0,1,2,3].map(j => (oc[2*j] + oc[2*j+1]) / 2);
const ct = cc.map(c => c - MATCH_H / 2);

const sc2 = [0,1].map(j => (cc[2*j] + cc[2*j+1]) / 2);
const st   = sc2.map(c => c - MATCH_H / 2);

const fc = (sc2[0] + sc2[1]) / 2;
const ft = fc - MATCH_H / 2;

const OCT_X   = 0;
const CUART_X = COL_W + CONN_W;
const SEMI_X  = CUART_X + COL_W + CONN_W;
const FINAL_X = SEMI_X  + COL_W + CONN_W;
const TOTAL_W = FINAL_X + COL_W;

const GOLD = 'rgba(212,168,83,0.4)';

const ROUNDS = [
  { label: 'OCTAVOS DE FINAL', x: OCT_X,   note: '16 alfajores' },
  { label: 'CUARTOS DE FINAL', x: CUART_X,  note: '8 alfajores'  },
  { label: 'SEMIFINAL',        x: SEMI_X,   note: '4 alfajores'  },
  { label: 'FINAL',            x: FINAL_X,  note: '2 alfajores'  },
];

// ─── State helpers ─────────────────────────────────────────────────
const mkTeam  = () => ({ name: '', image: null });
const mkScore = n  => Array(n).fill(null).map(() => [null, null]);

// ─── GitHub persistence ───────────────────────────────────────────
const GH_OWNER  = 'simypoxy';
const GH_REPO   = 'simypoxy.github.io';
const GH_FILE   = 'bracket-state.json';
const GH_BRANCH = 'main';
const RAW_URL   = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${GH_FILE}`;
const API_URL   = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;

function getToken() { try { return localStorage.getItem('mda_gh_token') || ''; } catch(e){ return ''; } }
function setToken(t) { try { localStorage.setItem('mda_gh_token', t); } catch(e){} }

async function fetchRemoteState() {
  try {
    const res = await fetch(RAW_URL + '?t=' + Date.now());
    if (!res.ok) return null;
    return await res.json();
  } catch(e) { return null; }
}

async function pushState(teams, scores, token) {
  // Get current SHA
  const headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
  let sha = null;
  try {
    const r = await fetch(API_URL, { headers });
    if (r.ok) { const j = await r.json(); sha = j.sha; }
  } catch(e){}

  const content = btoa(unescape(encodeURIComponent(JSON.stringify({ teams, scores }, null, 2))));
  const body = { message: 'Actualizar bracket', content, branch: GH_BRANCH };
  if (sha) body.sha = sha;

  const res = await fetch(API_URL, { method: 'PUT', headers, body: JSON.stringify(body) });
  return res.ok;
}

const INIT_TEAMS  = Array(16).fill(null).map(mkTeam);
const INIT_SCORES = { octavos: mkScore(8), cuartos: mkScore(4), semis: mkScore(2), final: mkScore(1) };

// ─── Winner logic ───────────────────────────────────────────────────
function getWinner(s0, s1) {
  if (s0 === null || s1 === null) return null;
  const a = parseFloat(s0), b = parseFloat(s1);
  if (isNaN(a) || isNaN(b)) return null;
  if (a > b) return 0;
  if (b > a) return 1;
  return null;
}

// ─── Resolve bracket ────────────────────────────────────────────────
function resolve(teams, scores) {
  const tbd = { team: null, idx: null, tbd: true };

  const octavos = Array(8).fill(0).map((_, i) => [
    { team: teams[i*2],   idx: i*2   },
    { team: teams[i*2+1], idx: i*2+1 },
  ]);

  function advance(slots, roundScores, matchIdx) {
    const [s0, s1] = roundScores[matchIdx];
    const w = getWinner(s0, s1);
    return w !== null ? slots[matchIdx][w] : tbd;
  }

  const cuartos = Array(4).fill(0).map((_, i) => [
    advance(octavos, scores.octavos, i*2),
    advance(octavos, scores.octavos, i*2+1),
  ]);

  const semis = Array(2).fill(0).map((_, i) => [
    advance(cuartos, scores.cuartos, i*2),
    advance(cuartos, scores.cuartos, i*2+1),
  ]);

  const final_ = [[
    advance(semis, scores.semis, 0),
    advance(semis, scores.semis, 1),
  ]];

  return { octavos, cuartos, semis, final: final_ };
}

// ─── SVG Connector Lines ────────────────────────────────────────────
function BracketLines({ fromCenters, toCenters, xFrom, xTo }) {
  const w = xTo - xFrom;
  const mx = w / 2;
  const els = [];
  for (let i = 0; i < toCenters.length; i++) {
    const y1 = fromCenters[i*2], y2 = fromCenters[i*2+1], yt = toCenters[i];
    els.push(
      <line key={`a${i}`} x1={0}  y1={y1} x2={mx} y2={y1} stroke={GOLD} strokeWidth={1.5}/>,
      <line key={`b${i}`} x1={0}  y1={y2} x2={mx} y2={y2} stroke={GOLD} strokeWidth={1.5}/>,
      <line key={`c${i}`} x1={mx} y1={y1} x2={mx} y2={y2} stroke={GOLD} strokeWidth={1.5}/>,
      <line key={`d${i}`} x1={mx} y1={yt} x2={w}  y2={yt} stroke={GOLD} strokeWidth={1.5}/>,
    );
  }
  return (
    <svg width={w} height={BHEIGHT} style={{position:'absolute', left:xFrom, top:0, pointerEvents:'none'}}>
      {els}
    </svg>
  );
}

// ─── Team Slot ──────────────────────────────────────────────────────
function TeamSlot({ slot, score, onScore, onEdit, isWinner, isLoser, teamIdx, isAdmin }) {
  const team = slot?.team;
  const editable = !slot?.tbd;
  const colorIdx = (teamIdx ?? 0) % 4;

  return (
    <div
      className={`team-slot ${isWinner ? 'winner' : ''} ${isLoser ? 'loser' : ''}`}
      onClick={() => isAdmin && editable && slot?.idx !== null && onEdit(slot.idx)}
      style={{cursor: isAdmin && editable ? 'pointer' : 'default'}}
    >
      {/* Avatar */}
      <div style={{
        width: 34, height: 34, borderRadius: '50%', flexShrink: 0,
        background: team?.image ? 'none' : 'rgba(212,168,83,0.06)',
        border: `1.5px solid ${isWinner ? '#d4a853' : 'rgba(212,168,83,0.22)'}`,
        overflow: 'hidden',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        position: 'relative', transition: 'border-color 0.3s',
      }}>
        {team?.image
          ? <img src={team.image} style={{width:'100%',height:'100%',objectFit:'cover'}} alt="" />
          : (
            slot?.tbd
              ? <span style={{fontSize:14, opacity:0.25}}>?</span>
              : <span style={{fontSize:15, opacity:0.3, color:'#d4a853'}}>＋</span>
          )
        }
      </div>

      {/* Name */}
      <span style={{
        flex:1, fontSize: 12.5,
        color: team?.name
          ? (isWinner ? '#f5e6c4' : 'rgba(240,223,192,0.85)')
          : (slot?.tbd ? 'rgba(240,223,192,0.2)' : 'rgba(240,223,192,0.28)'),
        overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
        fontWeight: isWinner ? 600 : 400,
        fontStyle: (slot?.tbd || !team?.name) ? 'italic' : 'normal',
        transition: 'color 0.3s',
      }}>
        {team?.name || (slot?.tbd ? 'Por definir' : 'Alfajor #' + ((slot?.idx ?? 0)+1))}
      </span>

      {/* Score */}
      {editable && (
        isAdmin ? (
          <input
            className="score-input"
            type="number" min="0" max="10" step="0.5"
            value={score ?? ''}
            placeholder="—"
            onChange={e => {
              e.stopPropagation();
              onScore(e.target.value === '' ? null : parseFloat(e.target.value));
            }}
            onClick={e => e.stopPropagation()}
          />
        ) : (
          <span style={{
            width:38, textAlign:'center', flexShrink:0,
            fontFamily:'Bebas Neue', fontSize:17,
            color: score !== null ? '#d4a853' : 'rgba(212,168,83,0.2)',
          }}>
            {score !== null ? score : '—'}
          </span>
        )
      )}

      {isWinner && (
        <span style={{fontSize:13, marginLeft:2, flexShrink:0, animation:'crownPop 0.4s ease'}}>👑</span>
      )}
    </div>
  );
}

// ─── Match Card ─────────────────────────────────────────────────────
function MatchCard({ match, matchScores, onScore, onEdit, isAdmin }) {
  const [s0, s1] = matchScores;
  const w = getWinner(s0, s1);

  return (
    <div className="match-card" style={{ width: COL_W, height: MATCH_H }}>
      {[0,1].map(slot => (
        <React.Fragment key={slot}>
          {slot === 1 && <div style={{height:1, background:'rgba(212,168,83,0.14)', margin:'0 8px'}} />}
          <TeamSlot
            slot={match[slot]}
            score={matchScores[slot]}
            onScore={v => onScore(slot, v)}
            onEdit={onEdit}
            isWinner={w === slot}
            isLoser={w !== null && w !== slot}
            teamIdx={match[slot]?.idx}
            isAdmin={isAdmin}
          />
        </React.Fragment>
      ))}
    </div>
  );
}

// ─── Edit Modal ─────────────────────────────────────────────────────
function EditModal({ idx, team, onSave, onClose }) {
  const [name, setName]   = useState(team?.name  || '');
  const [image, setImage] = useState(team?.image || null);
  const fileRef = useRef(null);

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setImage(ev.target.result);
    reader.readAsDataURL(file);
  }

  const colorIdx = idx % 4;

  return (
    <div style={{
      position:'fixed', inset:0, zIndex:999,
      background:'rgba(0,0,0,0.78)',
      display:'flex', alignItems:'center', justifyContent:'center',
      backdropFilter:'blur(8px)',
    }} onClick={onClose}>
      <div style={{
        background:'#1a0d05',
        border:'1px solid rgba(212,168,83,0.38)',
        borderRadius:20,
        padding:'36px 32px',
        width:310,
        boxShadow:'0 40px 80px rgba(0,0,0,0.75)',
        animation:'fadeInUp 0.25s ease',
      }} onClick={e => e.stopPropagation()}>

        {/* Ilustración alfajor */}
        <div style={{textAlign:'center', marginBottom:6}}>
          <img src={ALFAJOR_ICON} style={{width:80, height:'auto', margin:'0 auto', display:'block', opacity:0.85}} alt="" />
        </div>

        <div style={{fontFamily:'Bebas Neue', fontSize:24, color:'#d4a853', letterSpacing:3, marginBottom:22, textAlign:'center'}}>
          ALFAJOR #{idx + 1}
        </div>

        {/* Image picker */}
        <div style={{textAlign:'center', marginBottom:18}}>
          <div onClick={() => fileRef.current?.click()} style={{
            width:90, height:90, borderRadius:'50%',
            margin:'0 auto',
            background: image ? 'none' : 'rgba(212,168,83,0.05)',
            border:`2px dashed rgba(212,168,83,${image ? '0.65' : '0.28'})`,
            overflow:'hidden', cursor:'pointer',
            display:'flex', alignItems:'center', justifyContent:'center',
            transition:'border-color 0.2s',
          }}>
            {image
              ? <img src={image} style={{width:'100%',height:'100%',objectFit:'cover'}} alt="" />
              : <div style={{textAlign:'center', color:'rgba(212,168,83,0.45)', lineHeight:1.6}}>
                  <div style={{fontSize:20}}>📷</div>
                  <div style={{fontSize:10, fontFamily:'Lora'}}>Subir foto</div>
                </div>
            }
          </div>
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile} />
          {image && (
            <button onClick={() => setImage(null)}
              style={{marginTop:6, background:'none', border:'none', color:'rgba(240,223,192,0.35)', fontSize:11, cursor:'pointer', fontFamily:'Lora'}}>
              Quitar imagen
            </button>
          )}
        </div>

        {/* Name input */}
        <input
          type="text"
          value={name}
          onChange={e => setName(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && onSave(idx, { name, image })}
          placeholder="Nombre del alfajor…"
          style={{
            width:'100%',
            background:'rgba(212,168,83,0.07)',
            border:'1px solid rgba(212,168,83,0.28)',
            borderRadius:9,
            padding:'11px 14px',
            color:'#f0dfc0',
            fontFamily:'Lora',
            fontSize:14,
            outline:'none',
            marginBottom:22,
          }}
          autoFocus
        />

        <div style={{display:'flex', gap:10}}>
          <button className="btn-secondary" onClick={onClose}>Cancelar</button>
          <button className="btn-primary" onClick={() => onSave(idx, { name, image })}>GUARDAR</button>
        </div>
      </div>
    </div>
  );
}

// ─── Champion Banner ────────────────────────────────────────────────
function ChampionBanner({ team, teamIdx }) {
  if (!team?.name) return null;
  return (
    <div style={{textAlign:'center', marginTop:18, animation:'fadeInUp 0.6s ease'}}>
      <div style={{fontSize:10, letterSpacing:6, color:'rgba(212,168,83,0.55)', fontFamily:'Bebas Neue'}}>
        CAMPEÓN MUNDIAL
      </div>
      {team.image
        ? <img src={team.image} style={{width:56, height:56, borderRadius:'50%', border:'2px solid #d4a853', margin:'10px auto', display:'block', objectFit:'cover'}} alt="" />
        : <div style={{margin:'10px auto', display:'flex', justifyContent:'center'}}>
            <AlfajorIllustration colorIdx={(teamIdx ?? 0) % 4} size={56} />
          </div>
      }
      <div style={{
        fontFamily:'Bebas Neue', fontSize:'clamp(28px,4vw,52px)', letterSpacing:4,
        background:'linear-gradient(135deg, #d4a853, #f5d07a, #d4a853)',
        WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
        lineHeight:1.1,
      }}>
        🏆 {team.name}
      </div>
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────
function App() {
  const [teams,  setTeams]  = useState(INIT_TEAMS);
  const [scores, setScores] = useState(INIT_SCORES);
  const [editing,  setEditing]  = useState(null);
  const [tweaks,   setTweaks]   = useState(TWEAK_DEFAULTS);
  const [tweaksVis, setTweaksVis] = useState(false);
  const [isAdmin,   setIsAdmin]   = useState(false);
  const [showLogin, setShowLogin] = useState(false);
  const [tokenInput, setTokenInput] = useState('');
  const [saving,    setSaving]    = useState(false);
  const [saveMsg,   setSaveMsg]   = useState('');

  // Load remote state on mount
  useEffect(() => {
    fetchRemoteState().then(data => {
      if (data?.teams)  setTeams(data.teams);
      if (data?.scores) setScores(data.scores);
    });
  }, []);

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksVis(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVis(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    // Auto-login if token stored
    if (getToken()) setIsAdmin(true);
  }, []);

  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits: next }, '*');
  };

  async function handleSaveToGitHub() {
    setSaving(true); setSaveMsg('');
    const ok = await pushState(teams, scores, getToken());
    setSaving(false);
    setSaveMsg(ok ? '✓ Guardado' : '✗ Error al guardar');
    setTimeout(() => setSaveMsg(''), 3000);
  }

  function handleLogin() {
    if (!tokenInput.trim()) return;
    setToken(tokenInput.trim());
    setIsAdmin(true);
    setShowLogin(false);
    setTokenInput('');
  }

  function handleLogout() {
    setToken('');
    setIsAdmin(false);
  }

  const handleScore = useCallback((round, matchIdx, slot, val) => {
    if (!isAdmin) return;
    setScores(prev => ({
      ...prev,
      [round]: prev[round].map((m, i) =>
        i === matchIdx ? (slot === 0 ? [val, m[1]] : [m[0], val]) : m
      ),
    }));
  }, [isAdmin]);

  const handleSave = useCallback((idx, data) => {
    setTeams(prev => prev.map((t, i) => i === idx ? data : t));
    setEditing(null);
  }, []);

  const resolved = resolve(teams, scores);

  const [fs0, fs1] = scores.final[0];
  const fw = getWinner(fs0, fs1);
  const champion     = fw !== null ? resolved.final[0][fw]?.team    : null;
  const championIdx  = fw !== null ? resolved.final[0][fw]?.idx     : null;

  function renderRound(key, rMatches, rScores, tops, xPos) {
    return rMatches.map((match, i) => (
      <div key={i} style={{ position:'absolute', top: tops[i], left: xPos }}>
        <MatchCard
          match={match}
          matchScores={rScores[i]}
          onScore={(slot, val) => handleScore(key, i, slot, val)}
          onEdit={isAdmin ? setEditing : () => {}}
          isAdmin={isAdmin}
        />
      </div>
    ));
  }

  return (
    <div id="bracket-export-root" style={{ position:'relative', zIndex:1 }}>

      {/* Header */}
      <div style={{
        textAlign:'center',
        padding:'52px 32px 28px',
        background:'transparent',
        borderBottom:'1px solid rgba(212,168,83,0.1)',
        position:'relative',
        overflow:'hidden',
      }}>
        {/* Foto de fondo */}
        <div style={{
          position:'absolute', inset:0,

          backgroundSize:'cover',
          backgroundPosition:'center',
          filter:'brightness(0.22) saturate(0.7)',
          zIndex:0,
        }} />
        {/* Gradiente encima para mezclar */}
        <div style={{
          position:'absolute', inset:0,
          background:'linear-gradient(180deg, rgba(12,6,2,0.3) 0%, rgba(12,6,2,0.82) 100%)',
          zIndex:1,
        }} />

        <div style={{position:'relative', zIndex:2}}>
        <div style={{fontSize:10, letterSpacing:7, color:'rgba(212,168,83,0.75)', fontFamily:'Bebas Neue', marginBottom:10}}>
          EDICIÓN 2026
        </div>
        <h1 style={{
          fontFamily:'Bebas Neue',
          letterSpacing:6,
          lineHeight:1,
          fontSize:'clamp(38px, 6vw, 82px)',
          background:`linear-gradient(135deg, ${tweaks.accentColor}, #f5d07a, ${tweaks.accentColor})`,
          WebkitBackgroundClip:'text',
          WebkitTextFillColor:'transparent',
        }}>
          MUNDIAL DE ALFAJORES
        </h1>
        <div style={{fontSize:13, color:'rgba(240,223,192,0.38)', marginTop:10, fontFamily:'Lora', fontStyle:'italic'}}>
          16 competidores · 4 rondas · 1 campeón supremo
        </div>

        <ChampionBanner team={champion} teamIdx={championIdx} />
        </div>{/* end zIndex:2 */}
      </div>{/* end header */}

      {/* Admin bar */}
      <div style={{
        display:'flex', alignItems:'center', justifyContent:'flex-end',
        padding:'6px 24px', gap:12,
        background:'rgba(0,0,0,0.3)',
        borderBottom:'1px solid rgba(212,168,83,0.07)',
        minHeight:38,
      }}>
        {isAdmin ? (
          <>
            <span style={{fontSize:11, color:'rgba(212,168,83,0.6)', fontFamily:'Lora'}}>
              Modo edición activo
            </span>
            {saveMsg && <span style={{fontSize:11, color: saveMsg.startsWith('✓') ? '#7ecb7e' : '#e07070', fontFamily:'Lora'}}>{saveMsg}</span>}
            <button onClick={handleSaveToGitHub} disabled={saving} style={{
              background:'#d4a853', border:'none', borderRadius:6,
              color:'#120a05', fontFamily:'Bebas Neue', fontSize:14, letterSpacing:1,
              padding:'5px 16px', cursor:'pointer', opacity: saving ? 0.6 : 1,
            }}>
              {saving ? 'Guardando…' : 'GUARDAR'}
            </button>
            <button onClick={handleLogout} style={{
              background:'transparent', border:'1px solid rgba(212,168,83,0.25)', borderRadius:6,
              color:'rgba(240,223,192,0.4)', fontFamily:'Lora', fontSize:11,
              padding:'5px 12px', cursor:'pointer',
            }}>Salir</button>
          </>
        ) : (
          <button onClick={() => setShowLogin(true)} style={{
            background:'rgba(212,168,83,0.1)',
            border:'1px solid rgba(212,168,83,0.25)',
            borderRadius:6,
            color:'rgba(212,168,83,0.6)', fontFamily:'Lora', fontSize:12,
            cursor:'pointer', padding:'5px 12px',
            display:'flex', alignItems:'center', gap:6,
          }} title="Acceso admin">
            <span>🔒</span>
            <span style={{fontFamily:'Lora', fontSize:11}}>Admin</span>
          </button>
        )}
      </div>



      {/* Bracket */}
      <div style={{ overflowX:'auto', padding:'28px 48px 60px' }}>

        {/* Round labels */}
        <div style={{ position:'relative', width: TOTAL_W, height:44, marginBottom:12 }}>
          {ROUNDS.map((r, i) => (
            <div key={i} style={{ position:'absolute', left: r.x, width: COL_W, textAlign:'center' }}>
              <div style={{fontFamily:'Bebas Neue', fontSize:13, letterSpacing:2.5, color:'rgba(212,168,83,0.65)'}}>
                {r.label}
              </div>
              {tweaks.showRoundNotes && (
                <div style={{fontSize:10, color:'rgba(240,223,192,0.27)', fontFamily:'Lora', marginTop:2}}>
                  {r.note}
                </div>
              )}
            </div>
          ))}
        </div>

        {/* Canvas */}
        <div style={{ position:'relative', width: TOTAL_W, height: BHEIGHT }}>

          {/* Connector lines */}
          <BracketLines fromCenters={oc} toCenters={cc} xFrom={OCT_X  + COL_W} xTo={CUART_X} />
          <BracketLines fromCenters={cc} toCenters={sc2} xFrom={CUART_X + COL_W} xTo={SEMI_X}  />
          <BracketLines fromCenters={sc2} toCenters={[fc]} xFrom={SEMI_X  + COL_W} xTo={FINAL_X} />

          {/* Matches */}
          {renderRound('octavos', resolved.octavos, scores.octavos, ot, OCT_X)}
          {renderRound('cuartos', resolved.cuartos, scores.cuartos, ct, CUART_X)}
          {renderRound('semis',   resolved.semis,   scores.semis,   st, SEMI_X)}
          {renderRound('final',   resolved.final,   scores.final,   [ft], FINAL_X)}

          {/* Trophy marker */}
          {champion?.name && (
            <div style={{
              position:'absolute',
              top: ft + MATCH_H + 14,
              left: FINAL_X + COL_W/2,
              transform:'translateX(-50%)',
              textAlign:'center',
              fontSize:11, fontFamily:'Bebas Neue', letterSpacing:3,
              color:'rgba(212,168,83,0.45)',
              whiteSpace:'nowrap',
            }}>
              ✦ CAMPEÓN ✦
            </div>
          )}
        </div>
      </div>

      <div style={{paddingBottom:40}} />

      {/* Login modal */}
      {showLogin && (
        <div style={{
          position:'fixed', inset:0, zIndex:1000,
          background:'rgba(0,0,0,0.8)', display:'flex', alignItems:'center', justifyContent:'center',
          backdropFilter:'blur(8px)',
        }} onClick={() => setShowLogin(false)}>
          <div style={{
            background:'#1a0d05', border:'1px solid rgba(212,168,83,0.4)',
            borderRadius:16, padding:'32px 28px', width:300,
            boxShadow:'0 32px 64px rgba(0,0,0,0.7)',
          }} onClick={e => e.stopPropagation()}>
            <div style={{fontFamily:'Bebas Neue', fontSize:22, color:'#d4a853', letterSpacing:3, marginBottom:6, textAlign:'center'}}>ACCESO ADMIN</div>
            <div style={{fontSize:12, color:'rgba(240,223,192,0.4)', fontFamily:'Lora', marginBottom:20, textAlign:'center'}}>
              Ingresá tu GitHub Personal Access Token
            </div>
            <input
              type="password"
              value={tokenInput}
              onChange={e => setTokenInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleLogin()}
              placeholder="ghp_xxxxxxxxxxxx"
              autoFocus
              style={{
                width:'100%', background:'rgba(212,168,83,0.07)',
                border:'1px solid rgba(212,168,83,0.3)', borderRadius:8,
                padding:'10px 13px', color:'#f0dfc0', fontFamily:'Lora', fontSize:13,
                outline:'none', marginBottom:18,
              }}
            />
            <div style={{display:'flex', gap:10}}>
              <button className="btn-secondary" onClick={() => setShowLogin(false)}>Cancelar</button>
              <button className="btn-primary" onClick={handleLogin}>ENTRAR</button>
            </div>
          </div>
        </div>
      )}

      {/* Edit modal */}
      {editing !== null && (
        <EditModal
          idx={editing}
          team={teams[editing]}
          onSave={handleSave}
          onClose={() => setEditing(null)}
        />
      )}

      <TweaksPanel tweaks={tweaks} onChange={setTweak} visible={tweaksVis} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
